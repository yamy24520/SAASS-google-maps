<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220" width="560" height="220">
  <!-- Background -->
  <rect width="560" height="220" fill="#1A1714"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="55" x2="560" y2="55" stroke="#2A2520" stroke-width="1"/>
  <line x1="0" y1="110" x2="560" y2="110" stroke="#2A2520" stroke-width="1"/>
  <line x1="0" y1="165" x2="560" y2="165" stroke="#2A2520" stroke-width="1"/>
  <line x1="112" y1="0" x2="112" y2="220" stroke="#2A2520" stroke-width="1"/>
  <line x1="224" y1="0" x2="224" y2="220" stroke="#2A2520" stroke-width="1"/>
  <line x1="336" y1="0" x2="336" y2="220" stroke="#2A2520" stroke-width="1"/>
  <line x1="448" y1="0" x2="448" y2="220" stroke="#2A2520" stroke-width="1"/>

  <!-- Calendar card — shadow -->
  <rect x="154" y="28" width="188" height="168" rx="4" fill="#0C0A08" opacity="0.6"/>

  <!-- Calendar card -->
  <rect x="150" y="24" width="188" height="168" rx="4" fill="#F5F2EA"/>

  <!-- Calendar header -->
  <rect x="150" y="24" width="188" height="44" rx="4" fill="#1A1714"/>
  <rect x="150" y="48" width="188" height="20" fill="#1A1714"/>

  <!-- Binding rings -->
  <circle cx="196" cy="26" r="6" fill="none" stroke="#F5F2EA" stroke-width="2.5"/>
  <circle cx="244" cy="26" r="6" fill="none" stroke="#F5F2EA" stroke-width="2.5"/>
  <circle cx="292" cy="26" r="6" fill="none" stroke="#F5F2EA" stroke-width="2.5"/>

  <!-- Month label -->
  <text x="244" y="47" font-family="Georgia,'Times New Roman',serif" font-size="13" font-weight="400" fill="#F5F2EA" text-anchor="middle" letter-spacing="2">AGENDA</text>

  <!-- Day headers -->
  <text x="175" y="83" font-family="sans-serif" font-size="9" fill="#9C9589" text-anchor="middle" letter-spacing="0.5">LUN</text>
  <text x="202" y="83" font-family="sans-serif" font-size="9" fill="#9C9589" text-anchor="middle" letter-spacing="0.5">MAR</text>
  <text x="229" y="83" font-family="sans-serif" font-size="9" fill="#9C9589" text-anchor="middle" letter-spacing="0.5">MER</text>
  <text x="256" y="83" font-family="sans-serif" font-size="9" fill="#9C9589" text-anchor="middle" letter-spacing="0.5">JEU</text>
  <text x="283" y="83" font-family="sans-serif" font-size="9" fill="#9C9589" text-anchor="middle" letter-spacing="0.5">VEN</text>
  <text x="310" y="83" font-family="sans-serif" font-size="9" fill="#9C9589" text-anchor="middle" letter-spacing="0.5">SAM</text>

  <!-- Week 1 -->
  <text x="175" y="103" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">1</text>
  <text x="202" y="103" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">2</text>
  <text x="229" y="103" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">3</text>
  <text x="256" y="103" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">4</text>
  <text x="283" y="103" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">5</text>
  <text x="310" y="103" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">6</text>

  <!-- Week 2 -->
  <text x="175" y="122" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">7</text>
  <text x="202" y="122" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">8</text>
  <text x="229" y="122" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">9</text>
  <text x="256" y="122" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">10</text>
  <text x="283" y="122" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">11</text>
  <text x="310" y="122" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">12</text>

  <!-- Week 3 — highlighted day -->
  <text x="175" y="141" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">13</text>
  <!-- Highlight circle -->
  <circle cx="202" cy="137" r="12" fill="#1A1714"/>
  <text x="202" y="141" font-family="sans-serif" font-size="11" font-weight="700" fill="#F5F2EA" text-anchor="middle">14</text>
  <text x="229" y="141" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">15</text>
  <text x="256" y="141" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">16</text>
  <text x="283" y="141" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">17</text>
  <text x="310" y="141" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">18</text>

  <!-- Week 4 -->
  <text x="175" y="160" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">19</text>
  <text x="202" y="160" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">20</text>
  <text x="229" y="160" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">21</text>
  <text x="256" y="160" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">22</text>
  <text x="283" y="160" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">23</text>
  <text x="310" y="160" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">24</text>

  <!-- Week 5 -->
  <text x="175" y="179" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">25</text>
  <text x="202" y="179" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">26</text>
  <text x="229" y="179" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">27</text>
  <text x="256" y="179" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">28</text>
  <text x="283" y="179" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">29</text>
  <text x="310" y="179" font-family="sans-serif" font-size="11" fill="#6B6358" text-anchor="middle">30</text>

  <!-- Decorative pencil -->
  <g transform="translate(355, 120) rotate(-30)">
    <rect x="-4" y="-40" width="8" height="60" rx="1" fill="#C8C2B6"/>
    <polygon points="-4,20 4,20 0,32" fill="#E8E4D9"/>
    <rect x="-4" y="-44" width="8" height="6" rx="1" fill="#9C9589"/>
    <line x1="-4" y1="-40" x2="4" y2="-40" stroke="#9C9589" stroke-width="1"/>
    <line x1="0" y1="20" x2="0" y2="28" stroke="#1A1714" stroke-width="1.5"/>
  </g>

  <!-- Small note card -->
  <rect x="360" y="100" width="80" height="55" rx="2" fill="#FDFAF4" transform="rotate(8, 400, 127)"/>
  <line x1="370" y1="113" x2="430" y2="110" stroke="#E8E4D9" stroke-width="1.5" transform="rotate(8, 400, 127)"/>
  <line x1="370" y1="123" x2="430" y2="120" stroke="#E8E4D9" stroke-width="1.5" transform="rotate(8, 400, 127)"/>
  <line x1="370" y1="133" x2="415" y2="130" stroke="#E8E4D9" stroke-width="1.5" transform="rotate(8, 400, 127)"/>
</svg>
